name: Test image build on push or PR
on:
  push:
    branches:
      - master
    paths:
      - 'pi-gen/**'
      - 'packages/**'
      - '.github/workflows/on-push.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'pi-gen/**'
      - 'packages/**'
      - '.github/workflows/on-push.yml'

jobs:
    build:
      runs-on: ubuntu-latest
      defaults:
        run:
          shell: bash
          working-directory: pi-gen

      steps:
      - uses: actions/checkout@v4

      - name: Register binfmt_misc entries
        run: docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Run build script (with retries)
        run: |
          MAX_RETRIES=3
          RETRY_DELAY_SECONDS=30
          for attempt in $(seq 1 "$MAX_RETRIES"); do
            if sudo PIGEN_DOCKER_OPTS="-e DEPLOY_XZ=1" ./build-docker.sh; then
              exit 0
            fi
            if [ "$attempt" -eq "$MAX_RETRIES" ]; then
              echo "Build failed after ${attempt} attempts."
              exit 1
            fi
            echo "Build failed on attempt ${attempt}; retrying in ${RETRY_DELAY_SECONDS}s..."
            sleep "$RETRY_DELAY_SECONDS"
          done

      - name: List deploy directory
        run: ls -al deploy/
