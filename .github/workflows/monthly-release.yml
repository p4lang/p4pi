name: Monthly Release

on:
  workflow_dispatch:
  schedule:
    - cron: "17 12 1 * *" # At 12:17 on day-of-month 1 (avoid top-of-hour load)

permissions:
  contents: write
  pull-requests: write

jobs:
  monthly-release:
    if: ${{ github.repository == 'p4lang/p4pi' }}
    uses: p4lang/.github/.github/workflows/monthly-release.yml@main
    with:
      reviewers: fruffy, jafingerhut
